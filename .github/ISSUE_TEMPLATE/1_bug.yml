name: Bug Report
description: Report a bug or unexpected behavior.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a new issue, please search [existing issues](https://github.com/kodakoda-koda/Vimursor/issues) to avoid duplicates.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the bug.
      placeholder: |
        1. Launch Vimursor
        2. Press Cmd+Shift+Space
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS Version
      placeholder: "e.g., 15.1 (Sequoia)"
    validations:
      required: true
  - type: input
    id: vimursor-version
    attributes:
      label: Vimursor Version
      placeholder: "e.g., 1.0.0 or commit hash"
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: If applicable, attach screenshots or paste console logs.
      value: |
        <details><summary>Logs</summary>

        ```log

        ```

        </details>
    validations:
      required: false
  - type: checkboxes
    id: duplicate-check
    attributes:
      label: Duplicate Check
      options:
        - label: I have searched existing issues and confirmed this is not a duplicate.
          required: true
