name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-15

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .app bundle
        run: bash scripts/build-app.sh

      - name: Build dmg
        run: bash scripts/build-dmg.sh

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Vimursor.dmg
